services:
  app_proxy:
    environment:
      APP_HOST: pluto-mining-pluto-next_frontend_1
      APP_PORT: 7677
    depends_on:
      - frontend
    restart: on-failure

  mock:
    image: ghcr.io/plutomining/pluto-mock:1.0.0-beta.3@sha256:8a4fb011e8507b5acbf50e7b18eb94b82087c759da3482547a5ec0259d3b2a51
    ports:
      - "7670:7670"
      - "7651:7651"
      - "7652:7652"
      - "7653:7653"
      - "7654:7654"
      - "7655:7655"
      - "7656:7656"
      - "7657:7657"
      - "7658:7658"
      - "7659:7659"
      - "7660:7660"
    pid: host
    restart: on-failure
    environment:
      - LISTING_PORT=7670
      - PORTS=7651,7652,7653,7654,7655,7656,7657,7658,7659,7660
      - LOGS_PUB_ENABLED=false
    user: "1000:1000"

  discovery:
    image: ghcr.io/plutomining/pluto-discovery:2.0.0-beta.2@sha256:7cce6438dfeadd60ba10fdf722ce791763146ce679f2bea1f90efd0bf4fb81d5
    container_name: pluto-mining-pluto-next_discovery_1
    network_mode: "host"
    pid: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: on-failure
    environment:
      - PORT=7675
      - DETECT_MOCK_DEVICES=true
      - MOCK_DISCOVERY_HOST=http://172.17.0.1:7670
      - PYASIC_BRIDGE_HOST=http://localhost:8000
    volumes:
      - ${APP_DATA_DIR}/data/leveldb:/home/node/app/data
    user: "1000:1000"

  backend:
    image: ghcr.io/plutomining/pluto-backend:3.0.0-beta.4@sha256:4b937928b07c73d6fe3dc981c09da39bb0d0c199bc1eb09947df50d08056ca32
    container_name: pluto-mining-pluto-next_backend_1
    pid: host
    restart: on-failure
    environment:
      - PORT=7676
      - AUTO_LISTEN=true
      - DISCOVERY_SERVICE_HOST=http://172.17.0.1:7675
      - DELETE_DATA_ON_DEVICE_REMOVE=true
      - PYASIC_BRIDGE_HOST=http://pluto-mining-pluto-next_pyasic-bridge_1:8000
      - PROMETHEUS_HOST=http://pluto-mining-pluto-next_prometheus_1:9090
    volumes:
      - ${APP_DATA_DIR}/data/leveldb:/home/node/app/data
    depends_on:
      prometheus:
        condition: service_healthy
      pyasic-bridge:
        condition: service_healthy
    user: "1000:1000"

  frontend:
    image: ghcr.io/plutomining/pluto-frontend:3.0.0-beta.5@sha256:7b3cfd2bb6dbcd8c42f368bfe352f84ccdce8bc758eadaecc1f1c31a4d9d978f
    container_name: pluto-mining-pluto-next_frontend_1
    pid: host
    restart: on-failure
    depends_on:
      - backend
    environment:
      - PORT=7677
      - BACKEND_DESTINATION_HOST=http://pluto-mining-pluto-next_backend_1:7676
    volumes:
      - ${APP_DATA_DIR}/umbrel-app.yml:/tmp/umbrel-app.yml:ro
    user: "1000:1000"

  prometheus:
    image: ghcr.io/plutomining/pluto-prometheus:1.2.0-beta.4@sha256:268a55e812ff14bdde911b6c59dd0cc7961faa44d022d02bba9a2f7510ffc968
    container_name: pluto-mining-pluto-next_prometheus_1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=5GB"
    volumes:
      - ${APP_DATA_DIR}/data/prometheus:/prometheus
      - ${APP_DATA_DIR}/data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    pid: host
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget --spider --quiet http://localhost:9090/-/ready || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    user: "1000:1000"

  pyasic-bridge:
    image: ghcr.io/plutomining/pluto-pyasic-bridge:1.0.0-beta.4@sha256:06da2c9b5be60653882d43f91f799e9fdbf81fd6ba358e17c3474a4b708d3582
    container_name: pluto-mining-pluto-next_pyasic-bridge_1
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    user: "1000:1000"